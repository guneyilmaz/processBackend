version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: processmodule-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - processmodule-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # PostgreSQL Database (Alternative)
  postgres:
    image: postgres:16-alpine
    container_name: processmodule-postgres
    environment:
      - POSTGRES_DB=ProcessModuleDb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YourStrong@Passw0rd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - processmodule-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Process Module API
  processmodule-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: processmodule-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ProcessModuleDb;User=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true;MultipleActiveResultSets=true
      # Alternative PostgreSQL connection:
      # - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ProcessModuleDb;Username=postgres;Password=YourStrong@Passw0rd
      - JwtSettings__SecretKey=MyDockerSecretKeyForDevelopmentThatIs32Characters!
      - JwtSettings__Issuer=ProcessModuleAPI
      - JwtSettings__Audience=ProcessModuleClient
      - JwtSettings__ExpiryMinutes=60
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      # For PostgreSQL, use this instead:
      # postgres:
      #   condition: service_healthy
    networks:
      - processmodule-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: processmodule-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - processmodule-api
    networks:
      - processmodule-network

volumes:
  sqlserver_data:
  postgres_data:

networks:
  processmodule-network:
    driver: bridge